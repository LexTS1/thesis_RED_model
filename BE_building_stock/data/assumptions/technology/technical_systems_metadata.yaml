metadata_version: 1.0
observation_year: 2024
target_year: 2050
scope: stock-only modular heating, cooling, and PV assignment layer
out_of_scope:
  - heating efficiency
  - heat-pump COP
  - cooling SEER
  - useful or final energy demand
  - PV generation
  - grid demand
classification_vocabulary:
  observed: value transcribed or queried directly from a named source
  derived: deterministic transformation of observed or already-modeled values
  proxy: source-informed substitute where the ideal regional observation is unavailable
  model_assumption: fixed representation needed to define a technology package or mapping
  scenario_assumption: value that deliberately changes between modeled futures or cases

heating_share_normalization:
  Walloon Region:
    published_values:
      electricity: 0.060
      gas: 0.424
      oil: 0.375
      other: 0.138
    published_total: 0.997
    modeling_treatment: divide every published share by 0.997
    normalized_total: 1.0

source_registry:
  SCP_BE_SILC_2022:
    title: Belgian Social Climate Plan delivery report
    url: https://klimaat.be/doc/be-dlv2-final-report-clean-1.pdf
    locator: Table 3-2, regional main heating-energy shares based on BE-SILC 2022
  STATBEL_HBS_2024:
    title: Statbel Household Budget Survey 2024 cooling result
    url: https://statbel.fgov.be/fr/nouvelles/le-logement-premier-poste-de-depenses-des-belges
  EC_EPBD_45C_GUIDANCE:
    title: European Commission guidance on zero-emission buildings
    url: https://eur-lex.europa.eu/legal-content/en/ALL/?uri=CELEX%3A52025XC06438
    locator: low-temperature heat emitters at or below 45 degrees Celsius
  VEKA_FLUVIUS_PV_2024:
    title: VEKA/Fluvius PV installations and capacity workbook
    url: https://www.vlaanderen.be/veka/energie-en-klimaatbeleid-in-cijfers/toelichting-energiekaart-veka
  VEKA_ROOFTOP_POTENTIAL:
    title: VEKA official rooftop-potential workbook sheet
    url: https://www.vlaanderen.be/veka/energie-en-klimaatbeleid-in-cijfers/toelichting-energiekaart-veka
  BRUGEL_POWERBI_SNAPSHOT:
    title: BRUGEL renewable-energy open-data statistics
    url: https://www.brugel.brussels/documents/statistics/rechercher
    note: Exact nominal-power filter at or below 10 kW; snapshot last refreshed 2024-09-04.
  SIBELGA_PV_2024:
    title: Sibelga 2024 statistics report
    url: https://www.sibelga.be/asset/file/97dcf744-dffc-4210-9ab3-c5614d37afe0
  ORES_PV_2024:
    title: ORES 2024 annual report
    url: https://media.ores.be/ores-cms/bqbahojr/rapport-ores-sc-2024-fr.pdf
    note: The <=10 kVA decentralized-production chart is used as a PV proxy and regionally scaled.
  WALLONIA_PV_CAPACITY_2024:
    title: Published Walloon PV capacity series through 2024
    url: https://www.iea-pvps.org/wp-content/uploads/2025/12/IEA-PVPS-Task-1-NSR-Belgium-2024.pdf
  CWAPE_2024:
    title: CWaPE 2024 annual report publication record
    url: https://www.cwape.be/publications/document/6559
  SPW_SMALL_PV_SHARE:
    title: Service public de Wallonie photovoltaic technology overview
    url: https://energie.wallonie.be/home/energies-vertes/solaire-photovoltaique/technologie.html
  STATBEL_BUILDING_STOCK_2025:
    title: Statbel cadastral building stock open data 2025
    local_file: ../../raw/statbel/building_stock_open_data_2025.xlsx
  BRUSSELS_ENV_ROOFTOP:
    title: Brussels Environment renewable-energy and rooftop-potential indicator
    url: https://environnement.brussels/citoyen/documentation-et-outils/etat-des-lieux-de-lenvironnement/energie-dorigine-renouvelable
  SPW_ROOFTOP_METHOD:
    title: SPW renewable-potential estimation methodology
    url: https://energie.wallonie.be/files/%C3%89conomies%20au%20quotidien/Commune/Pollec/20170907_M%C3%A9thodo_potentiel_ER.pdf
  REGIONAL_PV_TARGETS_2030:
    title: Official regional 2030 photovoltaic production trajectories
    urls:
      - https://www.iea-pvps.org/wp-content/uploads/2025/12/IEA-PVPS-Task-1-NSR-Belgium-2024.pdf
      - https://environnement.brussels/citoyen/documentation-et-outils/etat-des-lieux-de-lenvironnement/energie-dorigine-renouvelable
  REGIONAL_PV_YIELD:
    title: Official regional reference yields used only for target-to-capacity conversion
    note: Flanders is derived from its paired official energy and capacity targets; Wallonia and Brussels use published reference yields.

