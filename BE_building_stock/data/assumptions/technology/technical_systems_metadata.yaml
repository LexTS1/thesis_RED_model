join_contract:
  base_state_key:
    - scenario
    - region
    - archetype_id
    - renovation_state
  heating_variant_key:
    - scenario
    - region
    - archetype_id
    - renovation_state
    - heating_variant_id
  cooling_variant_key:
    - scenario
    - region
    - archetype_id
    - renovation_state
    - cooling_case
    - cooling_variant_id
  pv_variant_key:
    - scenario
    - region
    - archetype_id
    - renovation_state
    - pv_variant_id
  warning: Do not join the three variant tables without explicitly accepting a heating x cooling x PV Cartesian product.
