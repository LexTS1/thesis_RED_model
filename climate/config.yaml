schema_version: 4

dataset:
  name: projections-cordex-domains-single-levels
  domain: europe
  horizontal_resolution: 0_11_degree_x_0_11_degree
  temporal_resolution: daily_mean
  variables:
    temperature: tas
    solar_radiation: rsds

model_chain:
  gcm_model: cnrm_cerfacs_cm5
  rcm_model: cnrm_aladin63
  ensemble_member: r1i1p1

spatial_extraction:
  method: nearest_point
  target_lat: 50.85
  target_lon: 4.35
  selected_lat: 50.79848111186651
  selected_lon: 4.269705300227394
  selected_indices:
    x: 191
    y: 239

physical_ranges:
  temperature_C: [-35.0, 50.0]
  solar_W_m2: [0.0, 1500.0]

solar_alpha_safety:
  minimum: 0.7
  maximum: 1.3

baseline_source: historical

provenance:
  legacy_model_root: /Users/alex/Library/CloudStorage/OneDrive-VrijeUniversiteitBrussel/Documenten/VUB/MA IW/Master Thesis/Legacy Models/model_v3
  single_chain_caveat: Climate-model uncertainty is not sampled because all scenarios use one GCM-RCM-member chain.
  observed_anchor_caveat: Applying the full 1981-2005 to 2050-2070 delta to PVGIS 2005-2023 weather would slightly double-count warming since the historical CORDEX reference period.

